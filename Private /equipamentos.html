<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipamentos - BioTrack solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/1241381.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-shield-alt me-2"></i>BioTrack Sistema
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="sidebarMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="equipamentos.html">Equipamentos</a></li>
                    <li class="nav-item"><a class="nav-link" href="fornecedores.html">Fornecedores</a></li>
                    <li class="nav-item"><a class="nav-link" href="localizacoes.html">Localizações</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="../public/index.html">
                            <i class="fas fa-sign-out-alt me-1"></i> Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center border-bottom pb-3 mb-4">
            <div>
                <h1 class="h2 fw-bold mb-1">Inventário de Equipamentos</h1>
                <p class="text-muted mb-0">Gestão global de dispositivos médicos e rastreabilidade</p>
            </div>
            <div class="mt-3 mt-md-0">
                <button class="btn btn-primary fw-bold" type="button" data-bs-toggle="modal" data-bs-target="#modalNovoEquipamento">
                    <i class="fas fa-plus me-2"></i>Registar Novo Equipamento
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">Código</th>
                                <th class="py-3">Designação</th>
                                <th class="py-3">Marca / Modelo</th>
                                <th class="py-3">Localização</th>
                                <th class="py-3">Criticidade</th>
                                <th class="px-4 py-3 text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-equipamentos">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalNovoEquipamento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle me-2"></i>Registar Novo Equipamento</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-equipamento">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Designação</label>
                                <input type="text" id="input-designacao" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Marca / Modelo</label>
                                <input type="text" id="input-marca" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Número de Série (Código)</label>
                                <input type="text" id="input-codigo" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nível de Criticidade</label>
                                <select id="input-criticidade" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option value="Baixa">Baixa</option>
                                    <option value="Média">Média</option>
                                    <option value="Alta">Alta</option>
                                    <option value="Suporte de Vida">Suporte de Vida</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Localização Atual</label>
                                <select id="input-localizacao" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option value="Cuidados Intensivos (UCI)">Cuidados Intensivos (UCI)</option>
                                    <option value="Urgência">Urgência</option>
                                    <option value="Bloco Operatório">Bloco Operatório</option>
                                    <option value="Medicina Interna">Medicina Interna</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer bg-light mt-4 mx-n4 mb-n4 px-4 py-3">
                            <button type="button" class="btn btn-outline-secondary fw-bold" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary fw-bold">Guardar Registo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/equipamentos.js"></script>
</body>
</html>
