<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizações - BioTrack solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/1241381.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <img src="../assets/img/logo_branco.png" alt="BioTrack Logo" height="30" class="me-2">
                <span class="fw-bold text-white">BioTrack</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="sidebarMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipamentos.html">Equipamentos</a></li>
                    <li class="nav-item"><a class="nav-link" href="fornecedores.html">Fornecedores</a></li>
                    <li class="nav-item"><a class="nav-link active" href="localizacoes.html">Localizações</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="../public/index.html">
                            <i class="fas fa-sign-out-alt me-1"></i> Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center border-bottom pb-3 mb-4">
            <div>
                <h1 class="h2 fw-bold mb-1">Mapeamento Hospitalar</h1>
                <p class="text-muted mb-0">Gestão de edifícios, pisos e serviços clínicos</p>
            </div>
            <div class="mt-3 mt-md-0">
                <button class="btn btn-primary fw-bold" type="button" data-bs-toggle="modal" data-bs-target="#modalNovaLocalizacao">
                    <i class="fas fa-map-marker-alt me-2"></i>Nova Localização
                </button>
            </div>
        </div>

        <div class="row g-4" id="grid-localizacoes">
        </div>
    </main>

    <div class="modal fade" id="modalNovaLocalizacao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle me-2"></i>Registar Localização</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-localizacao">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Serviço / Departamento</label>
                            <input type="text" id="input-nome-loc" class="form-control" placeholder="Ex: Ortopedia" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Edifício</label>
                                <input type="text" id="input-edificio" class="form-control" placeholder="Ex: Edifício Principal" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Piso</label>
                                <input type="text" id="input-piso" class="form-control" placeholder="Ex: Piso 3" required>
                            </div>
                        </div>
                        <div class="modal-footer bg-light mx-n4 mb-n4 px-4 py-3">
                            <button type="button" class="btn btn-outline-secondary fw-bold" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary fw-bold">Guardar Registo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/localizacoes.js"></script>
</body>
</html>
